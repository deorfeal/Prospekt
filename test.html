<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  html { font-size: 1px; }
  @media (min-width: 1200px) { html { font-size: 0.05209vw; } }

  .title--big {
    font-size: 149rem; /* adaptive-value(149,70) примерно */
    line-height: 130rem;
    letter-spacing: 7.5rem;
    font-family: 'Bebas Neue', sans-serif;
    color: transparent;
    -webkit-text-stroke: 4rem #fff;
    display: inline-block;
    background: #111;
    padding: 20px;
  }
</style>
</head>
<body style="background:#111">
<span class="title--big" id="el">DEFINE</span>
<div id="out" style="color:white;font-family:monospace;padding:20px;font-size:14px"></div>
<script>
document.fonts.ready.then(() => {
  const el = document.getElementById('el');
  const cs = getComputedStyle(el);
  const fs = parseFloat(cs.fontSize);
  const ls = cs.letterSpacing;
  const lsPx = parseFloat(ls);
  const W = el.offsetWidth;
  const H = el.offsetHeight;

  // canvas measure
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `400 ${fs}px 'Bebas Neue', sans-serif`;
  const chars = 'DEFINE'.split('').map(c => ({
    char: c,
    w: ctx.measureText(c).width
  }));
  const totalCanvas = chars.reduce((s,c) => s + c.w, 0) + lsPx * 5;

  document.getElementById('out').innerHTML = `
    <b>fontSize:</b> ${cs.fontSize} → parsed: ${fs}px<br>
    <b>letterSpacing:</b> "${ls}" → parsed: ${lsPx}px<br>
    <b>offsetWidth:</b> ${W}px<br>
    <b>offsetHeight:</b> ${H}px<br>
    <b>canvas total width (with ls):</b> ${totalCanvas.toFixed(1)}px<br>
    <b>chars:</b> ${chars.map(c => c.char+':'+c.w.toFixed(1)).join(' | ')}<br>
    <b>match?</b> ${Math.abs(totalCanvas - W) < 10 ? '✅ близко' : '❌ расхождение ' + (totalCanvas - W).toFixed(1) + 'px'}
  `;
});
</script>
</body>
</html>
